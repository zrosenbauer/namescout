name: Build Snapshot

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  build-snapshot:
    name: Build & Upload Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Build snapshot database
        run: |
          node -e "
            import { openDatabase, initializeSchema } from '@namescout/db';
            import { syncPackageNames, embedNewPackages } from '@namescout/data';
            const db = openDatabase('./namescout.db');
            initializeSchema(db);
            await syncPackageNames(db);
            await embedNewPackages(db);
            db.close();
          "

      - name: Upload to R2
        run: |
          aws s3 cp ./namescout.db s3://namescout-snapshots/namescout.db \
            --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto

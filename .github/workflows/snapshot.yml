name: Build Snapshot

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: snapshot
  cancel-in-progress: false

env:
  RCLONE_CONFIG_R2_TYPE: s3
  RCLONE_CONFIG_R2_PROVIDER: Cloudflare
  RCLONE_CONFIG_R2_NO_CHECK_BUCKET: 'true'

jobs:
  build-snapshot:
    name: Build & Upload Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install rclone
        run: sudo apt-get install -y rclone

      - name: Download existing snapshot
        run: rclone copyto r2:namescout-snapshots/namescout.db ./namescout.db --s3-no-check-bucket || echo "No existing snapshot found, starting fresh."
        env:
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com

      - name: Sync and embed new packages
        run: |
          node -e "
            import { openDatabase, initializeSchema } from '@namescout/db';
            import { syncPackageNames, embedNewPackages } from '@namescout/data';
            const db = openDatabase('./namescout.db');
            initializeSchema(db);
            await syncPackageNames(db);
            await embedNewPackages(db);
            db.close();
          "

      - name: Compress with zstd
        run: zstd -f -19 ./namescout.db -o ./namescout.db.zst

      - name: Upload to R2
        run: |
          rclone copyto ./namescout.db r2:namescout-snapshots/namescout.db --progress --s3-no-check-bucket
          rclone copyto ./namescout.db.zst r2:namescout-snapshots/namescout.db.zst --progress --s3-no-check-bucket
        env:
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com

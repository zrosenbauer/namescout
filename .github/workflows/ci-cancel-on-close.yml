name: Cancel Stale CI

on:
  pull_request:
    types: [closed]

jobs:
  cancel:
    name: Cancel Stale Runs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Cancel in-progress runs for this PR
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.payload.pull_request.head.sha;
            const branch = context.payload.pull_request.head.ref;

            const workflows = ['ci.yml'];

            for (const file of workflows) {
              try {
                const runs = await github.rest.actions.listWorkflowRuns({
                  owner, repo, workflow_id: file, branch, status: 'in_progress',
                });
                const queued = await github.rest.actions.listWorkflowRuns({
                  owner, repo, workflow_id: file, branch, status: 'queued',
                });

                const allRuns = [...runs.data.workflow_runs, ...queued.data.workflow_runs]
                  .filter(run => run.head_sha === headSha);

                for (const run of allRuns) {
                  try {
                    core.info(`Cancelling ${file} run #${run.id} (${run.status})`);
                    await github.rest.actions.cancelWorkflowRun({ owner, repo, run_id: run.id });
                  } catch (e) {
                    core.warning(`Failed to cancel ${file} run #${run.id}: ${e.message}`);
                  }
                }

                if (allRuns.length === 0) {
                  core.info(`No active runs for ${file}`);
                }
              } catch (e) {
                core.warning(`Failed to list runs for ${file}: ${e.message}`);
              }
            }

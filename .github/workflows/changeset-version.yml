name: Changeset Version

on:
  push:
    branches: [main]

concurrency:
  group: changeset-version
  cancel-in-progress: false

jobs:
  version:
    name: Version Packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ !startsWith(github.event.head_commit.message, 'release:') && !startsWith(github.event.head_commit.message, 'chore(release):') }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for changesets
        id: check
        run: |
          if ls .changeset/*.md 1>/dev/null 2>&1; then
            count=$(ls .changeset/*.md 2>/dev/null | grep -v README.md | wc -l | tr -d ' ')
            if [ "$count" -gt "0" ]; then
              echo "has_changesets=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_changesets=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create version PR
        if: steps.check.outputs.has_changesets == 'true'
        uses: changesets/action@v1
        with:
          title: 'release: version packages'
          commit: 'release: version packages'
          version: pnpm changeset:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
